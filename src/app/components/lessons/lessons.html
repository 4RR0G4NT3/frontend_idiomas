<div class="container" *ngIf="levelData$ | async as data">
  <div class="header-section">
    <div class="top-nav">
      <button [routerLink]="['/', data.langId]" class="btn btn-light back-btn">
        ← Volver a Niveles
      </button>
    </div>
    
    <div class="title-container">
      <h1>Nivel {{ data.level?.name }}</h1>
      <p class="progress-info">
        Lecciones completadas: {{ getCompletedCount(data.level) }} / {{ data.level?.lessons?.length }}
      </p>
    </div>
  </div>

  <div class="lesson-list card">
    <div class="lesson-item" 
         *ngFor="let lesson of data.level?.lessons; let i = index" 
         [routerLink]="['/', data.langId, data.level?.id, lesson.id]"
         [class.is-completed]="lesson.completed">
      <div class="status-indicator">
        <span class="check-icon" *ngIf="lesson.completed">✓</span>
        <span class="index" *ngIf="!lesson.completed">{{ i + 1 }}</span>
      </div>
      <div class="lesson-info">
        <span class="title">{{ lesson.title }}</span>
        <span class="status-text">{{ lesson.completed ? 'Completada' : 'En curso' }}</span>
      </div>
      <div class="arrow">→</div>
    </div>
  </div>

  <div *ngIf="data.level?.lessons?.length === 0" class="empty-state">
    <div class="empty-icon">📚</div>
    <h3>Contenido próximamente</h3>
    <p>Estamos trabajando en nuevas lecciones para este nivel.</p>
  </div>
</div>
